---
# A stable model that always returns 200
apiVersion: v1
kind: ConfigMap
metadata:
  name: stable-model-script
  namespace: ig-retry-test
data:
  server.py: |
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import json

    class Handler(BaseHTTPRequestHandler):
        def do_POST(self):
            content_length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(content_length)

            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.end_headers()
            self.wfile.write(json.dumps({"predictions": [{"label": "stable-model", "score": 0.92}]}).encode())

        def do_GET(self):
            self.send_response(200)
            self.end_headers()
            self.wfile.write(b"OK")

    if __name__ == "__main__":
        server = HTTPServer(("0.0.0.0", 8080), Handler)
        print("Stable model server starting on port 8080")
        server.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stable-model
  namespace: ig-retry-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stable-model
  template:
    metadata:
      labels:
        app: stable-model
    spec:
      containers:
        - name: model
          image: python:3.11-slim
          command: ["python", "/app/server.py"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: script
              mountPath: /app
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: script
          configMap:
            name: stable-model-script
---
apiVersion: v1
kind: Service
metadata:
  name: stable-model
  namespace: ig-retry-test
spec:
  selector:
    app: stable-model
  ports:
    - port: 80
      targetPort: 8080
